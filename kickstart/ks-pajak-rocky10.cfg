url --url="https://mirror.chpc.utah.edu/pub/rocky/10/BaseOS/x86_64/os/"
repo --name=epel --baseurl=https://mirror.chpc.utah.edu/pub/epel/10/Everything/x86_64/

# force text mode, please
text

# System language
lang en_US.UTF-8

# disable firstboot
firstboot --disable

# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'

# Disable firewall (We use hardware firewalls)
firewall --disabled

# Set SELinux to enforcing (Which is default)
selinux --enforcing

# Set the timezone
timezone America/Denver

# Set the root password
rootpw resetm3n0w

# add a user
user --name=xthor --groups=wheel --password=p@ssw0rd

# Reboot after installation
reboot --eject

# Network configuration
network --onboot=yes --device=link --bootproto=static --noipv6 --activate --hostname=pajak.xthorsworld.com --ip=10.200.50.30 --netmask=255.255.255.0 --gateway=10.200.50.1 --nameserver=10.200.50.1

# RAID1 across both NVMe drives - UEFI only
ignoredisk --only-use=nvme0n1,nvme1n1
clearpart --all --initlabel --drives=nvme0n1,nvme1n1

part /boot/efi  --fstype=efi --size=512 --ondisk=nvme0n1
part raid.boot0 --fstype="mdmember" --size=1024 --ondisk=nvme0n1
part raid.pv0   --fstype="mdmember" --size=1 --grow --ondisk=nvme0n1

part /boot/efi2 --fstype=efi --size=512 --ondisk=nvme1n1
part raid.boot1 --fstype="mdmember" --size=1024 --ondisk=nvme1n1
part raid.pv1   --fstype="mdmember" --size=1 --grow --ondisk=nvme1n1

raid /boot --fstype="xfs" --level=RAID1 --device=md_boot raid.boot0 raid.boot1
raid pv.01 --fstype="lvmpv" --level=RAID1 --device=md_root raid.pv0 raid.pv1

volgroup vg00 --pesize=4096 pv.01
logvol swap --fstype="swap" --name="swap" --vgname="vg00" --size=128
logvol /    --fstype="ext4" --name="root" --vgname="vg00" --size=4096 --grow

%packages
@core --nodefaults
@^minimal-environment
bash-completion
dnf-plugins-core
mdadm
vim-enhanced
wget
%end

%post
# add my ssh pubkey to this server
mkdir -m0700 /home/xthor/.ssh/

cat <<EOF >/home/xthor/.ssh/authorized_keys
ssh-rsa  linux
ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBEMajokRd8LTapXzNeh2EvgCchVLur6777HGThz4jvpnEAJfCtXOT/C1LLAQhCFc1hdNzCT/YD0AAOs/dY6hBS4= macbook pro m4 14
ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBBTwUxyjPuBQJDHcP4lzarhNn/vNd6qEPg1ndCGzRCoFTzNHt3D+QZQELDX7Mcstlc+Lx5KFoi83AdPCv02rri4= m4 mac mini
ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBHcrNplP2ZhuJTfVkDE3uu6AGcvmDHgOfWcLaGdfJXrRWxvxsAxv7p5SJGDrk3T5ne9e4biLvkwuy+FZNdzgPaQ= m3 macbook air 15
ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBM/ImWv7UDLqSJAMv8yWg/G5IEAt/sX4tt7g8JoJIDDjIVTCRdURmmqiSY0yyapWatLq4neuBaUB0YWMvkHGxcI= m4 pro mac mini
EOF

### set permissions
chmod 0600 /home/xthor/.ssh/authorized_keys

### set ownership
chown -R xthor:xthor /home/xthor/.ssh

### fix up selinux context
restorecon -R /home/xthor/.ssh/

### allow sudo without password
sed -i 's/^%wheel/\#%wheel/g' /etc/sudoers
sed -i 's/^\# %wheel/%wheel/g' /etc/sudoers

### install epel and base packages
dnf -y install epel-release
crb enable

## show the IP address on the login screen
echo -e "IPv4: \\\4\n" >> /etc/issue

### EFI redundancy: sync primary EFI contents to second drive
rsync -a /boot/efi/ /boot/efi2/

### register second drive's EFI partition as a fallback boot entry
dnf -y install efibootmgr
EFI2_PART=$(lsblk -lno NAME,PARTTYPE /dev/nvme1n1 | awk '/c12a7328/{print $1}' | grep -o '[0-9]*$')
efibootmgr --create --disk /dev/nvme1n1 --part ${EFI2_PART} --label "Rocky Linux (nvme1n1 fallback)" --loader '\EFI\rocky\shimx64.efi'
PRIMARY=$(efibootmgr | awk '/^\*.*Rocky Linux$/{gsub(/Boot|\*/,"",$1); print $1}')
FALLBACK=$(efibootmgr | awk '/nvme1n1 fallback/{gsub(/Boot|\*/,"",$1); print $1}')
efibootmgr --bootorder ${PRIMARY},${FALLBACK}

### install kernel-install hook to keep EFI partitions in sync on kernel updates
cat <<'EOF' > /etc/kernel/install.d/99-sync-efi.install
#!/bin/bash
rsync -a /boot/efi/ /boot/efi2/
EOF
chmod +x /etc/kernel/install.d/99-sync-efi.install

# End of kickstart script
%end
